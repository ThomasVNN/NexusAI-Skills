<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="sk-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F172A"/><stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="sk-box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B45309"/><stop offset="1" stop-color="#78350F"/>
    </linearGradient>
    <marker id="sk-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="900" height="480" fill="url(#sk-bg)"/>
  <text x="450" y="36" text-anchor="middle" fill="#F1F5F9" font-size="22" font-weight="700">NexusAI-Skills  Tool Registry &amp; MCP Execution</text>
  <text x="450" y="58" text-anchor="middle" fill="#94A3B8" font-size="12">Bounded Context: Skills À Owner: AI Agent</text>

  <g font-size="12" fill="#F1F5F9">
    <!-- Registry -->
    <rect x="40" y="100" width="240" height="320" rx="10" fill="url(#sk-box)" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="160" y="124" text-anchor="middle" font-weight="700">SKILL REGISTRY</text>
    <g fill="#FEF3C7" font-size="11">
      <text x="60" y="156">GET    /api/skills</text>
      <text x="60" y="176">GET    /api/skills/:id</text>
      <text x="60" y="196">POST   /api/skills</text>
      <text x="60" y="216">PUT    /api/skills/:id</text>
      <text x="60" y="236">DELETE /api/skills/:id</text>
      <text x="60" y="256">POST   /api/skills/:id/evaluate</text>
      <text x="60" y="286" fill="#FDE68A" font-size="10" font-style="italic">Skill manifest:</text>
      <text x="60" y="302" fill="#FDE68A" font-size="10" font-style="italic">  id, version, manifest,</text>
      <text x="60" y="318" fill="#FDE68A" font-size="10" font-style="italic">  trust_score, status,</text>
      <text x="60" y="334" fill="#FDE68A" font-size="10" font-style="italic">  category</text>
    </g>

    <!-- Policy engine -->
    <rect x="300" y="100" width="240" height="320" rx="10" fill="url(#sk-box)" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="420" y="124" text-anchor="middle" font-weight="700">POLICY ENGINE</text>
    <g fill="#FEF3C7" font-size="11">
      <text x="320" y="156">GET  /api/policies</text>
      <text x="320" y="176">POST /api/policies</text>
      <text x="320" y="206" fill="#FDE68A" font-size="10" font-style="italic">Trust-score evaluation</text>
      <text x="320" y="222" fill="#FDE68A" font-size="10" font-style="italic">Capability whitelist</text>
      <text x="320" y="238" fill="#FDE68A" font-size="10" font-style="italic">Resource limits</text>
      <text x="320" y="254" fill="#FDE68A" font-size="10" font-style="italic">Tenant isolation</text>
      <text x="320" y="280" fill="#FDE68A" font-size="10" font-style="italic">Built-in connectors:</text>
      <text x="320" y="296" fill="#FDE68A" font-size="10" font-style="italic">  Jira À ServiceNow À SAP</text>
    </g>

    <!-- Sandbox -->
    <rect x="560" y="100" width="300" height="320" rx="10" fill="url(#sk-box)" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="710" y="124" text-anchor="middle" font-weight="700">SANDBOXED EXECUTION</text>
    <g fill="#FEF3C7" font-size="11">
      <text x="580" y="156">POST /api/skills/:id/execute</text>
      <text x="580" y="186" fill="#FDE68A" font-size="10" font-style="italic">MCP endpoints:</text>
      <text x="580" y="202">GET  /mcp/v1/tools</text>
      <text x="580" y="220">POST /mcp/v1/call</text>
      <text x="580" y="252" fill="#FDE68A" font-size="10" font-style="italic">Isolation: per-execution VM</text>
      <text x="580" y="268" fill="#FDE68A" font-size="10" font-style="italic">Resource caps: CPU, mem, time</text>
      <text x="580" y="284" fill="#FDE68A" font-size="10" font-style="italic">Execution record persisted</text>
    </g>

    <!-- Consumers -->
    <g stroke="#94A3B8" stroke-width="1.5" fill="none" marker-end="url(#sk-arrow)">
      <line x1="160" y1="100" x2="160" y2="80"/>
      <line x1="710" y1="100" x2="710" y2="80"/>
    </g>
    <rect x="40" y="40" width="820" height="40" rx="8" fill="#1E293B" stroke="#3B82F6"/>
    <text x="450" y="66" text-anchor="middle" font-size="12" font-weight="600">æ Gateway (MCP tool calls) À NCC (registry admin) À Chat (skill discovery)</text>
  </g>
</svg>
